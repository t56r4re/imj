<!-- products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All products – CodeCanvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="site-header"> <!-- same nav as index --> 
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">CodeCanvas<span class="logo-dot">.</span></a>
                <nav class="main-nav">
                    <ul>
                        <li><a href="products.html" class="active">Products</a></li>
                        <li><a href="login.html">Login</a></li>
                        <li><a href="dashboard.html">Dashboard</a></li>
                    </ul>
                </nav>
                <button class="mobile-menu-btn">☰</button>
            </div>
        </div>
    </header>

    <main class="products-main">
        <div class="container">
            <div class="products-header">
                <h1>All digital products</h1>
                <!-- basic filter / category nav (static) -->
                <div class="filter-row">
                    <span class="filter-label">Filter:</span>
                    <div class="filter-chips">
                        <span class="chip active" data-filter="all">All</span>
                        <span class="chip" data-filter="tool">Tools</span>
                        <span class="chip" data-filter="template">Templates</span>
                        <span class="chip" data-filter="course">Courses</span>
                    </div>
                </div>
            </div>
            <div class="product-grid" id="all-products-container">
                <!-- full list from products.js -->
            </div>
        </div>
    </main>

    <footer class="site-footer"> <!-- same as index --> 
        <div class="container">......</div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.allProducts !== 'undefined') {
                renderProductList(window.allProducts, 'all-products-container');
            }
            // simple filter simulation
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', function(e) {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    // just visual (no real filter for demo)
                });
            });
        });
    </script>
</body>
</html>
